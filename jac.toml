[project]
name = "preview-template"
version = "1.0.0"
description = "Jac client application: preview-template"
entry-point = "main.jac"

[dependencies]
[dependencies.npm]
jac-client-node = "1.0.7"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "2.0.0"
tailwindcss = "latest"
"@tailwindcss/vite" = "latest"



[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins]
[plugins.client]
[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[jacpack]
name = 'test'
description = 'Jac IDE snapshot for test'
